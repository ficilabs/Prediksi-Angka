<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AI Digit Predictor | Kelompok 4</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Space+Grotesk:wght@300..700&family=Sofia&display=swap"
    rel="stylesheet">

  <!-- Dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@0.12.0"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="main-container">
    <header class="title-section">
      <h1>Digit Predictor</h1>
      <p class="footer-text">Powered by Convolutional Neural Networks</p>
    </header>

    <section class="workspace">
      <div class="glass-card canvas-container">
        <canvas id="main-canvas" width="300" height="300"></canvas>
        <canvas id="small-canvas" width="28" height="28"></canvas>
        <button class="btn-modern" id="erase">Clear Workspace</button>
      </div>

      <div class="glass-card result-panel">
        <div class="prediction-box">
          <p class="footer-text" style="margin-top:0">Prediction</p>
          <div id="prediction"></div>
          <div id="confidence">&#8212</div>
        </div>

        <div class="info-section">
          <h5 style="margin-bottom: 1rem; color: var(--accent-primary)">Kelompok 4 Researchers</h5>
          <ul class="group-list">
            <li class="group-item">MOH ROFIQI <span>2021300046</span></li>
          </ul>
        </div>
      </div>
    </section>

    <footer class="footer-text">
      Built with TensorFlow.js & Modern CSS
    </footer>
  </main>

  <script src="script.js"></script>
</body>

</html>
